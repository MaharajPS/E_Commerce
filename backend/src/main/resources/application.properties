spring.application.name=ecommerce-marketplace

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# SWAGGER
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=ecommerce-marketplace-super-secret-key-2024-production-grade-long-key
jwt.expiration=86400000

# ===============================
# STRIPE CONFIG (Test Mode)
# ===============================
stripe.secret.key=sk_test_51SqtFuH3E32cbsgKWQZSkDlyroy7JlDH92T2WYzRuvGMX5eC9tkfQmaA0dRACsp4YPAPt4FschEu1QfGvhEniQTo00khaSDfEl
